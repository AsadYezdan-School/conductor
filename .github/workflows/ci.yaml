name: CI

on:
  push:
    branches: ["**"]
    tags: ["release-*"]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.8.5
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Build Project
        run: bazel build --config=remote --remote_header=x-buildbuddy-api-key=${{ secrets.BUILD_BUDDY_API_KEY }} //...

      - name: Run Tests
        run: bazel test --config=remote --remote_header=x-buildbuddy-api-key=${{ secrets.BUILD_BUDDY_API_KEY }} //...

      - name: Setup AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Login To ECR Public
        run: |
          aws ecr-public get-login-password --region us-east-1 | \
          docker login --username AWS --password-stdin public.ecr.aws

      - name: Publish All Images
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/dev-')) ||
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/release-'))
        env:
          BUILD_BUDDY_API_KEY: ${{ secrets.BUILD_BUDDY_API_KEY }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH_NAME: ${{ github.ref_name }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: bazel run --config=remote //:publish_images

      - name: Setup Node
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/dev-')) ||
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/release-'))
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: infra/aws-minimal/package-lock.json

      - name: Install AWS CDK app dependencies
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/dev-')) ||
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/release-'))
        working-directory: infra/aws-minimal
        run: npm install

      - name: Bootstrap AWS CDK
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/dev-')) ||
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/release-'))
        working-directory: infra/aws-minimal
        run: npx cdk bootstrap aws://$(aws sts get-caller-identity --query Account --output text)/eu-west-1

      - name: Wait for stack to reach a stable state
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/dev-')) ||
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/release-'))
        run: |
          while true; do
            STATUS=$(aws cloudformation describe-stacks --stack-name AwsMinimalStack \
              --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "DOES_NOT_EXIST")
            if [[ "$STATUS" != *"_IN_PROGRESS" ]]; then
              break
            fi
            echo "Stack is in $STATUS — waiting 15s..."
            sleep 15
          done
          echo "Stack status: $STATUS"
          if [[ "$STATUS" == "ROLLBACK_COMPLETE" || "$STATUS" == "ROLLBACK_FAILED" ]]; then
            echo "Deleting failed stack before redeploy..."
            aws cloudformation delete-stack --stack-name AwsMinimalStack
            aws cloudformation wait stack-delete-complete --stack-name AwsMinimalStack
          fi

      - name: Deploy to AWS
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/dev-')) ||
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/release-'))
        working-directory: infra/aws-minimal
        run: npx cdk synth && npx cdk deploy --require-approval never

      - name: Get stack outputs for migration
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/dev-')) ||
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/release-'))
        id: cfn
        run: |
          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name AwsMinimalStack \
            --query 'Stacks[0].Outputs' \
            --output json)

          get_output() {
            echo "$OUTPUTS" | jq -r --arg key "$1" '.[] | select(.OutputKey == $key) | .OutputValue'
          }

          echo "task_def_arn=$(get_output MigrationTaskDefArn)" >> "$GITHUB_OUTPUT"
          echo "migration_sg=$(get_output MigrationSgId)"       >> "$GITHUB_OUTPUT"
          echo "subnet_id=$(get_output PublicSubnetId)"         >> "$GITHUB_OUTPUT"

      - name: Register migration task definition with new image
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/dev-')) ||
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/release-'))
        id: register_task
        run: |
          IMAGE="public.ecr.aws/a9s2p1s8/conductor/liquibase-migrations:${TAG}"
          echo "Running migration with image: ${IMAGE}"

          TASK_DEF_JSON=$(aws ecs describe-task-definition \
            --task-definition "${{ steps.cfn.outputs.task_def_arn }}" \
            --query 'taskDefinition' \
            --output json)

          NEW_TASK_DEF=$(echo "$TASK_DEF_JSON" | jq \
            --arg img "$IMAGE" \
            'del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                 .placementConstraints, .compatibilities, .registeredAt, .registeredBy)
             | .containerDefinitions[0].image = $img')

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "task_def_arn=${NEW_ARN}" >> "$GITHUB_OUTPUT"
          echo "Registered task definition: ${NEW_ARN}"

      - name: Run DB migration
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/dev-')) ||
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/release-'))
        id: run_task
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster conductor \
            --task-definition "${{ steps.register_task.outputs.task_def_arn }}" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={
              subnets=[${{ steps.cfn.outputs.subnet_id }}],
              securityGroups=[${{ steps.cfn.outputs.migration_sg }}],
              assignPublicIp=ENABLED
            }" \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "task_arn=${TASK_ARN}" >> "$GITHUB_OUTPUT"
          echo "Started migration task: ${TASK_ARN}"

      - name: Wait for migration to complete
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/dev-')) ||
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/release-'))
        run: |
          TASK_ARN="${{ steps.run_task.outputs.task_arn }}"
          echo "Waiting for migration task ${TASK_ARN} to stop..."

          while true; do
            STATUS=$(aws ecs describe-tasks \
              --cluster conductor \
              --tasks "$TASK_ARN" \
              --query 'tasks[0].lastStatus' \
              --output text)
            echo "Task status: $STATUS"
            if [ "$STATUS" = "STOPPED" ]; then
              break
            fi
            sleep 10
          done

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster conductor \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          STOPPED_REASON=$(aws ecs describe-tasks \
            --cluster conductor \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].stoppedReason' \
            --output text)

          echo "Container exit code: ${EXIT_CODE}"
          echo "Stopped reason: ${STOPPED_REASON}"

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration failed with exit code ${EXIT_CODE}"
            exit 1
          fi
          echo "Migration completed successfully."