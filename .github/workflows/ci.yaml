name: CI

on:
  push:
    branches: ["**"]
    tags: ["release-*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.8.5
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Build Project
        run: bazel build //...

      - name: Run Tests
        run: bazel test //...

      - name: Login To Docker
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/dev-')) ||
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/release-'))
        uses: docker/login-action@v4
        with:
          username: redocktunetes
          password: ${{secrets.DOCKERREGISTRYTOKEN}}

      - name: Publish All Images
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/dev-')) ||
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/release-'))
        env:
          COMMIT_SHA: ${{ github.sha }}
          BRANCH_NAME: ${{ github.ref_name }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: bazel run //:publish_images