name: Run Database Migrations

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "migrate" to confirm'
        required: true
      command:
        description: 'Migration command to run'
        required: true
        default: 'update'
        type: choice
        options:
          - update
          - rollback
      rollback_tag:
        description: 'Tag to roll back to (required when command is "rollback")'
        required: false

jobs:
  migrate:
    if: github.event.inputs.confirm == 'migrate'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate inputs
        env:
          COMMAND: ${{ github.event.inputs.command }}
          ROLLBACK_TAG: ${{ github.event.inputs.rollback_tag }}
        run: |
          if [[ "$COMMAND" == "rollback" && -z "$ROLLBACK_TAG" ]]; then
            echo "Error: rollback_tag is required when command is 'rollback'"
            exit 1
          fi

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.8.5
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Login to ECR Public
        run: |
          aws ecr-public get-login-password --region us-east-1 | \
            docker login --username AWS --password-stdin public.ecr.aws

      - name: Compute image tag
        id: tag
        env:
          COMMIT_SHA: ${{ github.sha }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          SHORT_SHA="${COMMIT_SHA:0:7}"
          if [[ "${BRANCH_NAME}" == release/* ]]; then
            TAG="${BRANCH_NAME}"
          elif [[ "${BRANCH_NAME}" == main ]]; then
            TAG="main-${SHORT_SHA}"
          else
            TAG="${BRANCH_NAME}-${SHORT_SHA}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image=public.ecr.aws/a9s2p1s8/conductor/liquibase-migrations:${TAG}" >> "$GITHUB_OUTPUT"
          echo "Publishing migration image with tag: ${TAG}"

      - name: Build and publish migration image
        run: |
          bazel run --config=remote \
            --remote_header=x-buildbuddy-api-key=${{ secrets.BUILD_BUDDY_API_KEY }} \
            //db-migrations:publish_image -- --tag "${{ steps.tag.outputs.tag }}"

      - name: Get stack outputs
        id: cfn
        run: |
          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name AwsMinimalStack \
            --query 'Stacks[0].Outputs' \
            --output json)

          get_output() {
            echo "$OUTPUTS" | jq -r --arg key "$1" '.[] | select(.OutputKey == $key) | .OutputValue'
          }

          echo "task_def_arn=$(get_output MigrationTaskDefArn)" >> "$GITHUB_OUTPUT"
          echo "migration_sg=$(get_output MigrationSgId)"       >> "$GITHUB_OUTPUT"
          echo "subnet_id=$(get_output PublicSubnetId)"         >> "$GITHUB_OUTPUT"

      - name: Register task definition revision with new image
        id: register_task
        run: |
          TASK_DEF_JSON=$(aws ecs describe-task-definition \
            --task-definition "${{ steps.cfn.outputs.task_def_arn }}" \
            --query 'taskDefinition' \
            --output json)

          NEW_TASK_DEF=$(echo "$TASK_DEF_JSON" | jq \
            --arg img "${{ steps.tag.outputs.image }}" \
            'del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                 .placementConstraints, .compatibilities, .registeredAt, .registeredBy)
             | .containerDefinitions[0].image = $img')

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "task_def_arn=${NEW_ARN}" >> "$GITHUB_OUTPUT"
          echo "Registered task definition revision: ${NEW_ARN}"

      - name: Run ECS migration task
        id: run_task
        env:
          COMMAND: ${{ github.event.inputs.command }}
          ROLLBACK_TAG: ${{ github.event.inputs.rollback_tag }}
        run: |
          if [[ "$COMMAND" == "rollback" ]]; then
            CMD_JSON="[\"rollback\",\"--tag\",\"${ROLLBACK_TAG}\"]"
          else
            CMD_JSON='["update"]'
          fi

          OVERRIDES="{\"containerOverrides\":[{\"name\":\"MigrationContainer\",\"command\":${CMD_JSON}}]}"

          TASK_ARN=$(aws ecs run-task \
            --cluster conductor \
            --task-definition "${{ steps.register_task.outputs.task_def_arn }}" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={
              subnets=[${{ steps.cfn.outputs.subnet_id }}],
              securityGroups=[${{ steps.cfn.outputs.migration_sg }}],
              assignPublicIp=ENABLED
            }" \
            --overrides "$OVERRIDES" \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "task_arn=${TASK_ARN}" >> "$GITHUB_OUTPUT"
          echo "Started migration task (${COMMAND}): ${TASK_ARN}"

      - name: Wait for task to complete
        run: |
          TASK_ARN="${{ steps.run_task.outputs.task_arn }}"
          echo "Waiting for task ${TASK_ARN} to stop..."

          while true; do
            STATUS=$(aws ecs describe-tasks \
              --cluster conductor \
              --tasks "$TASK_ARN" \
              --query 'tasks[0].lastStatus' \
              --output text)
            echo "Task status: $STATUS"
            if [ "$STATUS" = "STOPPED" ]; then
              break
            fi
            sleep 10
          done

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster conductor \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          STOPPED_REASON=$(aws ecs describe-tasks \
            --cluster conductor \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].stoppedReason' \
            --output text)
          echo "Stopped reason: $STOPPED_REASON"

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration task failed with exit code $EXIT_CODE"
            exit 1
          fi
          echo "Migration command completed successfully."
