include classpath("application.conf")

node-address {
  protocol = http
  host     = "0.0.0.0"
  port     = 9324
}

rest-sqs {
  enabled       = true
  bind-port     = 9324
  bind-hostname = "0.0.0.0"
  sqs-limits    = strict
}

rest-stats {
  enabled       = true
  bind-port     = 9325
  bind-hostname = "0.0.0.0"
}

queues {
  conductor-jobs {
    defaultVisibilityTimeout = 30 seconds
    delay                    = 0 seconds
    receiveMessageWait       = 0 seconds
    deadLettersQueue {
      name            = "conductor-jobs-dlq"
      maxReceiveCount = 3
    }
  }
  conductor-jobs-dlq { }
}

aws {
  region    = "us-east-1"
  accountId = "000000000000"
}
