server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — unknown paths serve index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the submitter, stripping the /api prefix
    # Mirrors the Vite dev server proxy: /api/jobs → http://submitter:8080/jobs
    location /api/ {
        proxy_pass         http://submitter:8080/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
}
